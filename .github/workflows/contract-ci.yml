name: Contract CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - "contract/**"
      - ".github/workflows/contract-ci.yml"

jobs:
  test-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract tests
        working-directory: ./contract
        run: cargo test --workspace

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Optimize contract WASM and enforce size budget
        working-directory: ./contract
        run: ./scripts/optimize_and_check_wasm.sh

      - name: Upload WASM size metrics
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm-size-metrics
          path: contract/target/wasm-metrics/sizes.md
          if-no-files-found: error

      - name: Build contract docs
        working-directory: ./contract
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps
